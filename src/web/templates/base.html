<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Velora{% endblock %}</title>
    <link rel="icon" type="image/svg+xml" href="/static/logo.svg?v=3">
    <link rel="icon" type="image/png" sizes="32x32" href="/static/favicon-32.png?v=3">
    <link rel="icon" type="image/png" sizes="16x16" href="/static/favicon-16.png?v=3">
    <link rel="apple-touch-icon" sizes="180x180" href="/static/apple-touch-icon.png?v=3">
    <link rel="shortcut icon" href="/static/favicon-32.png?v=3">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/main.css">
    <script src="/static/vendor/htmx.min.js"></script>
    {% block head %}{% endblock %}
</head>
<body data-page="{{ page }}">
    <div class="app-layout">
        {% include "components/nav.html" %}

        <main class="main-content">
            {% block content %}{% endblock %}
        </main>
    </div>

    {% include "components/chat_widget.html" %}

    {% block scripts %}{% endblock %}
    <script>
      // Auto-Reload alle 15 Min — außer auf der Chat-Seite (Konversation nicht killen).
      if (!document.querySelector('.chat-layout')) {
        setTimeout(()=>location.reload(), 15*60*1000);
      }
    </script>
</body>
</html>
